<!DOCTYPE html>
<html>

<head>

<title>Add Expense</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-box">

<h2>Add Expense</h2>

<form method="POST">

<input
name="title"
placeholder="Expense Title"
required>

<input
name="category"
placeholder="Category"
required>

<input
type="number"
step="0.01"
name="amount"
placeholder="Amount"
required>

<input
type="date"
name="date"
required>

<button>Add Expense</button>

</form>

</div>

</body>

</html>

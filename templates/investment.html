<!DOCTYPE html>
<html>

<head>

<title>Add Investment</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-box">

<h2>Add Investment</h2>

<form method="POST">

<input
name="name"
placeholder="Investment Name"
required>

<input
type="number"
step="0.01"
name="amount"
placeholder="Amount"
required>

<button type="submit">
Save Investment
</button>

</form>

</div>

</body>

</html>
